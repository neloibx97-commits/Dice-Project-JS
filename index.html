<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

   
    </style>
  </head>
  <body>
    <div id="dice-container" class="flex justify-between p-30 bg-green-200 h-300 w-auto">
      <!-- LEFT COLUMN -->

      <div id="dice-left" class="flex flex-col m-5 p-10 gap-5">
        <!-- DIE1 -->
         
        <div
          id="die-1"
          class="flex justify-between w-50 h-50 bg-yellow-200 p-5 rounded-xl border-4 border-black-400"
        >
          <div class="flex flex-col justify-between">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>

          <div class="flex flex-col justify-between">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>
        </div>

        <!-- DIE2 -->
        <div
          id="die-2"
          class="flex justify-between w-50 h-50 bg-yellow-200 p-5 rounded-xl border-4 border-black-400"
        >
          <div class="flex flex-col justify-between">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>

          <div class="flex justify-center items-center">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>

          <div class="flex flex-col justify-between">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>
        </div>

        <!-- DIE3 -->
        <div
          id="die-3"
          class="flex justify-between w-50 h-50 bg-yellow-200 p-5 rounded-xl border-4 border-black-400"
        >
          <div class="flex flex-col justify-between">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>
          <div class="flex flex-col justify-between">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div id="dice-right" class="flex flex-col m-5 p-10 gap-5">

        <!-- DIE4 -->
        <div
          id="die-4"
          class="flex justify-between w-50 h-50 bg-yellow-200 p-5 rounded-xl border-4 border-black-400"
        >
          <div class="flex justify-start">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>

          <div class="flex justify-center items-center">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>

          <div class="flex flex-col justify-end">
            <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
          </div>
          </div>

        <!-- DIE5 -->
          <div id="die-5" class="flex justify-between w-50 h-50 bg-yellow-200 p-5 rounded-xl border-4 border-black-400">

            <div class="flex justify-start">
              <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            </div>
            <div class="flex flex-col justify-end">
              <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            </div>
          </div>

          <!-- DIE6 -->
          <div id="die-6" class="flex justify-center items-center w-50 h-50 bg-yellow-200 p-5 rounded-xl border-4 border-black-400">

              <div class="w-10 h-10 rounded-full border-4 bg-gray-600"></div>
            </div>



          </div>
        </div>
        
      </div>
      
    </div>

  </body>
</html>
